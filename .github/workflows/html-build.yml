name: Rebuild all with asciidoctor

on:
  # Runs on pushes targeting the main branch.
  push:
    branches: ["main"]
  # Runs on pull requests, uses the action's description from the target branch.
  pull_request_target:
    types: [opened,synchronize]

  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt -y install dos2unix
          sudo apt -y install asciidoctor
      - name: Build AsciiDoctor
        run: |
          find . -name "*.asciidoc" -exec touch {} \;
          make all
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: HTML
          path: ${{github.workspace}}/**/*.html

  # Deployment job
  deploy:
    if: ${{ github.event_name == 'push'}}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v1
